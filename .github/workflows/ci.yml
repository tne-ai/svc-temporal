name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Typecheck + tests ───────────────────────────────────────────────────
  # Runs on the repository alone — no tne-plugins submodule checkout, no
  # cluster access. Validates the TS source compiles and the unit tests
  # (vitest, src/**) pass. Anything that needs the vendored skills lives
  # under tne-plugins/** and is excluded by vitest.config.ts.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Typecheck (tsc)
        run: yarn build

      - name: Unit tests (vitest)
        run: yarn test --run

  # ── Test Docker build ───────────────────────────────────────────────────
  # Builds the production image without pushing, exercising the full
  # Dockerfile path (incl. tne-plugins submodule + Claude CLI install).
  # Requires the org-level GitHub App secrets that troopship already uses
  # (APP_ID, APP_PRIVATE_KEY) to clone the private tne-plugins submodule
  # and pass GITHUB_TOKEN into the build for git deps. If those secrets
  # aren't set in this repo's environment, the job will fail at the
  # token-mint step — that's the signal to add them.
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: tne-ai

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: recursive

      - name: Rewrite SSH submodule URLs to HTTPS
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf \
            "git@github.com:"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          build-args: |
            GITHUB_TOKEN=${{ steps.app-token.outputs.token }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
